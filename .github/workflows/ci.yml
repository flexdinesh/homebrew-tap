name: CI

on:
  pull_request:
    paths:
      - Formula/**
      - Casks/**
      - .github/workflows/ci.yml
  push:
    branches:
      - main
    paths:
      - Formula/**
      - Casks/**
      - .github/workflows/ci.yml

permissions:
  contents: read

jobs:
  formulae:
    name: Formulae
    runs-on: macos-latest
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Validate formulae
        shell: bash
        run: |
          set -euo pipefail

          shopt -s nullglob
          formula_paths=(Formula/*.rb)
          cask_paths=(Casks/*.rb)
          if [[ ${#formula_paths[@]} -eq 0 && ${#cask_paths[@]} -eq 0 ]]; then
            echo "No formulae or casks to validate."
            exit 0
          fi

          brew style flexdinesh/tap

          for formula_path in "${formula_paths[@]}"; do
            formula="$(basename "${formula_path}" .rb)"
            qualified_formula="flexdinesh/tap/${formula}"

            brew audit --strict --online "${qualified_formula}"
            brew install "${qualified_formula}"
            brew test "${qualified_formula}"
          done

          for cask_path in "${cask_paths[@]}"; do
            cask="$(basename "${cask_path}" .rb)"
            qualified_cask="flexdinesh/tap/${cask}"

            brew audit --strict --online --cask "${qualified_cask}"
            brew install --cask "${qualified_cask}"
          done
